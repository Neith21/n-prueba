name: Python CI

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Set up .env
        run: echo "${{ secrets.PYTHON_ENV_FILE }}" > .env

      - name: Restart service
        run: sudo systemctl restart s3uploader
